services:
  - type: web
    name: genai-knowledge-assistant
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.api.rag_api:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
    healthCheckPath: /